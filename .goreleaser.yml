version: 2

project_name: malox

before:
  hooks:
    - go mod tidy

builds:
  - id: malox
    main: ./cmd/malox
    binary: malox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.buildDate={{ .Date }}

archives:
  - id: malox
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

brews:
  - name: malox
    ids:
      - malox
    repository:
      owner: darckorp
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/darckorp/malox"
    description: "Fast cross-platform terminal security scanner for open source projects"
    license: "MIT"
    install: |
      bin.install "malox"
    test: |
      system "#{bin}/malox", "--version"
